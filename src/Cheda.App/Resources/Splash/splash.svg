  <circle cx="180" cy="162" r="3" fill="#00FF41" opacity="0.6"/>
  <circle cx="276" cy="162" r="3" fill="#00FF41" opacity="0.6"/>
  <circle cx="180" cy="258" r="3" fill="#00FF41" opacity="0.6"/>
  <circle cx="276" cy="258" r="3" fill="#00FF41" opacity="0.6"/>

  <!-- ₵ symbol -->
  <text x="228" y="228" font-family="Georgia, serif" font-size="62" font-weight="bold"
