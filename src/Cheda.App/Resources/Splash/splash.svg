  <!-- Static cursor block after tagline -->
  <rect x="262" y="318" width="7" height="11" fill="#00FF41" opacity="0.65"/>

  <!-- Progress bar -->
  <rect x="138" y="366" width="180" height="2.5" fill="#0A1A0A" rx="1.5"/>
  <rect x="138" y="366" width="96"  height="2.5" fill="#00FF41" rx="1.5" opacity="0.7"/>

  <!-- Small scan line at progress (depth effect) -->
  <line x1="138" y1="380" x2="234" y2="380" stroke="#00FF41" stroke-width="0.5" opacity="0.3"/>

  <!-- Version stamp -->
  <text x="228" y="400" font-family="monospace" font-size="8"
        fill="#003310" text-anchor="middle" letter-spacing="1">v1.0.0 // INITIALIZING</text>

