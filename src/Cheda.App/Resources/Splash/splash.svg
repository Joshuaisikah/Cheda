<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!-- Background is #0F172A set via csproj Color — SVG is the centered graphic -->

  <!-- Outer ring — faint -->
  <circle cx="228" cy="228" r="180" fill="none" stroke="#00875A" stroke-width="1" opacity="0.15"/>
  <!-- Mid ring -->
  <circle cx="228" cy="228" r="140" fill="none" stroke="#00875A" stroke-width="1" opacity="0.25"/>

  <!-- Diagonal accent lines -->
  <line x1="48" y1="228" x2="408" y2="228" stroke="#334155" stroke-width="1"/>
  <line x1="228" y1="48" x2="228" y2="408" stroke="#334155" stroke-width="1"/>

  <!-- Corner tick marks -->
  <line x1="88" y1="88" x2="108" y2="108" stroke="#00875A" stroke-width="2" opacity="0.4"/>
  <line x1="368" y1="88" x2="348" y2="108" stroke="#00875A" stroke-width="2" opacity="0.4"/>
  <line x1="88" y1="368" x2="108" y2="348" stroke="#00875A" stroke-width="2" opacity="0.4"/>
  <line x1="368" y1="368" x2="348" y2="348" stroke="#00875A" stroke-width="2" opacity="0.4"/>

  <!-- Main badge — large, centred -->
  <rect x="158" y="158" width="140" height="140" rx="36" fill="#00875A"/>

  <!-- ₵ glyph -->
  <text x="228" y="258" font-family="Georgia, serif" font-size="96" font-weight="bold"
        fill="#FFFFFF" text-anchor="middle">₵</text>

  <!-- App name — spaced out, below badge -->
  <text x="228" y="332" font-family="monospace, sans-serif" font-size="14" font-weight="600"
        fill="#94A3B8" text-anchor="middle" letter-spacing="8">CHEDA</text>

  <!-- Tagline -->
  <text x="228" y="352" font-family="sans-serif" font-size="9"
        fill="#475569" text-anchor="middle" letter-spacing="2">MONEY. CLEAR.</text>
</svg>
