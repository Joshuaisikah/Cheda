  <line x1="152" y1="0"   x2="152" y2="456" stroke="#00FF41" stroke-width="0.4" opacity="0.07"/>
  <line x1="304" y1="0"   x2="304" y2="456" stroke="#00FF41" stroke-width="0.4" opacity="0.07"/>

  <!-- Corner HUD brackets -->
  <line x1="10" y1="10" x2="46" y2="10" stroke="#00FF41" stroke-width="2"   opacity="0.5"/>
