  <circle cx="10" cy="10" r="2.5" fill="#00FF41" opacity="0.7"/>

  <line x1="446" y1="10"  x2="410" y2="10"  stroke="#00FF41" stroke-width="2" opacity="0.5"/>
  <line x1="446" y1="10"  x2="446" y2="46"  stroke="#00FF41" stroke-width="2" opacity="0.5"/>
  <circle cx="446" cy="10"  r="2.5" fill="#00FF41" opacity="0.7"/>

  <line x1="10"  y1="446" x2="46"  y2="446" stroke="#00FF41" stroke-width="2" opacity="0.5"/>
  <line x1="10"  y1="446" x2="10"  y2="410" stroke="#00FF41" stroke-width="2" opacity="0.5"/>
  <circle cx="10"  cy="446" r="2.5" fill="#00FF41" opacity="0.7"/>

  <line x1="446" y1="446" x2="410" y2="446" stroke="#00FF41" stroke-width="2" opacity="0.5"/>
  <line x1="446" y1="446" x2="446" y2="410" stroke="#00FF41" stroke-width="2" opacity="0.5"/>
  <circle cx="446" cy="446" r="2.5" fill="#00FF41" opacity="0.7"/>

  <!-- Matrix rain columns (static decoration) -->
  <text x="22"  y="55"  font-family="monospace" font-size="13" fill="#00FF41" opacity="0.75">ア</text>
  <text x="22"  y="72"  font-family="monospace" font-size="13" fill="#00FF41" opacity="0.52">イ</text>
  <text x="22"  y="89"  font-family="monospace" font-size="13" fill="#00FF41" opacity="0.33">0</text>
  <text x="22"  y="106" font-family="monospace" font-size="13" fill="#00FF41" opacity="0.17">1</text>
  <text x="22"  y="123" font-family="monospace" font-size="13" fill="#00FF41" opacity="0.07">Ψ</text>

  <text x="420" y="290" font-family="monospace" font-size="13" fill="#00FF41" opacity="0.75">テ</text>
  <text x="420" y="307" font-family="monospace" font-size="13" fill="#00FF41" opacity="0.52">1</text>
  <text x="420" y="324" font-family="monospace" font-size="13" fill="#00FF41" opacity="0.33">ア</text>
  <text x="420" y="341" font-family="monospace" font-size="13" fill="#00FF41" opacity="0.17">Ω</text>

  <text x="50"  y="360" font-family="monospace" font-size="13" fill="#00FF41" opacity="0.65">Φ</text>
  <text x="50"  y="377" font-family="monospace" font-size="13" fill="#00FF41" opacity="0.42">カ</text>
  <text x="50"  y="394" font-family="monospace" font-size="13" fill="#00FF41" opacity="0.20">0</text>

  <text x="392" y="88"  font-family="monospace" font-size="13" fill="#00FF41" opacity="0.65">0</text>
  <text x="392" y="105" font-family="monospace" font-size="13" fill="#00FF41" opacity="0.42">Σ</text>
  <text x="392" y="122" font-family="monospace" font-size="13" fill="#00FF41" opacity="0.22">β</text>

  <!-- Outer glow ring around logo card -->
  <circle cx="228" cy="210" r="96" stroke="#00FF41" stroke-width="0.6" fill="none" opacity="0.12"/>

  <!-- Logo card — dark with neon border -->
  <rect x="174" y="156" width="108" height="108" rx="28"
