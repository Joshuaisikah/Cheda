<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!-- Foreground layer: badge + ₵ centred on transparent background -->
  <!-- Android adaptive icon clips to a circle/squircle, badge must be inset -->

  <!-- Green badge (squircle) -->
  <rect x="78" y="78" width="300" height="300" rx="80" fill="#00875A"/>

  <!-- Subtle inner highlight — top-left arc for depth -->
  <rect x="78" y="78" width="300" height="150" rx="80" fill="#00A86B" opacity="0.3"/>

  <!-- ₵ symbol, white -->
  <text x="228" y="268" font-family="Georgia, serif" font-size="180" font-weight="bold"
        fill="#FFFFFF" text-anchor="middle">₵</text>
</svg>
